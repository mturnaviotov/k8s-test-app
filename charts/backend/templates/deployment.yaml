apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-{{ .Chart.Name }}"
  labels:
    {{- include "labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name  | quote }}
      app.kubernetes.io/name: {{ .Chart.Name | quote }}
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name | quote }}
        app.kubernetes.io/name: {{ .Chart.Name | quote }}
      annotations:
        {{- include "annotations" . | nindent 8 }}
    spec:
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.35
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-postgresql 5432; do echo waiting for postgresql; sleep 2; done;']
      {{- end }}
      {{- if .Values.securityContext.enabled }}
      securityContext:
        {{- with .Values.securityContext.data }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name | quote }}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: {{ .Values.service.listenPort | default "8080" }}
              name: http
          env:
            - name: listenPort
              value: "{{ .Values.service.listenPort | default "8080" }}"
            - name: DB_HOST
              value: "{{ .Release.Name }}-postgresql"
            - name: DB_PORT
              value: "5432"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "todo-postgresql"
                  key: password
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: "todo-postgresql"
                  key: username
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: "todo-postgresql"
                  key: database
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
                path: /healthz
                port: {{ .Values.service.listenPort | default "8080" }}
            periodSeconds: 30
          livenessProbe:
            httpGet:
                path: /healthz
                port: {{ .Values.service.listenPort | default "8080" }}
            initialDelaySeconds: 60
            periodSeconds: 30
