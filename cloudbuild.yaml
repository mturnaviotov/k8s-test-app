substitutions:
  _PROJECT_ID: "test-122133"
  _REGION: "europe-central2"
  _REPOSITORY: "app-repo"
  _BACKEND_SERVICE: "backend-api"
  _FRONTEND_SERVICE: "frontend-app"
  _PREFIX: "913152726026"
steps:
  # 1. Build the Backend Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_BACKEND_SERVICE}:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_BACKEND_SERVICE}:latest"
      - "./backend"
    id: "build-backend"

  # 2. Build the Frontend Image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "REACT_APP_API_URL=https://${_BACKEND_SERVICE}-${_PREFIX}.${_REGION}.run.app"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_FRONTEND_SERVICE}:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_FRONTEND_SERVICE}:latest"
      - "./frontend"
    id: "build-frontend"

  # 3. Push the Backend Images
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_BACKEND_SERVICE}:$SHORT_SHA"
    id: "push-backend-sha"
    waitFor: ["build-backend"]

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_BACKEND_SERVICE}:latest"
    id: "push-backend-latest"
    waitFor: ["build-backend"]

  # 4. Push the Frontend Images
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_FRONTEND_SERVICE}:$SHORT_SHA"
    id: "push-frontend-sha"
    waitFor: ["build-frontend"]

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_FRONTEND_SERVICE}:latest"
    id: "push-frontend-latest"
    waitFor: ["build-frontend"]

  # 5. Deploy Backend-api to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_BACKEND_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_BACKEND_SERVICE}:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--project"
      - "${_PROJECT_ID}"
    id: "deploy-backend"
    waitFor: ["push-backend-sha"]

  # 6. Deploy Frontend-app to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_FRONTEND_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_FRONTEND_SERVICE}:$SHORT_SHA"
      - "--region"
      - "${_REGION}"
      - "--project"
      - "${_PROJECT_ID}"
    id: "deploy-frontend"
    waitFor: ["push-frontend-sha"]

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_BACKEND_SERVICE}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_BACKEND_SERVICE}:latest"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_FRONTEND_SERVICE}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/${_PROJECT_ID}/${_REPOSITORY}/${_FRONTEND_SERVICE}:latest"
